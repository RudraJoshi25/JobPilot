# ------------------------------------------------------------
# Projects
# ------------------------------------------------------------
projects:
  - name: PersonaQuery
    description: >
      Full RAG pipeline with evaluation harness using golden sets to
      regression-test retrieval quality across prompt iterations.
      Implemented citation guardrails and hallucination mitigation.
      Benchmarked deployment trade-offs via p95 latency measurements.
    stack:
      - LangChain
      - LlamaIndex
      - Groq Llama-3.3-70B
      - FastAPI
      - FAISS
    metrics:
      - p95 latency benchmarking across deployment configs

  - name: HealthEcho
    description: >
      Anomaly detection pipeline with systematic threshold tuning
      achieving ~40% false positive reduction. Includes FastAPI
      inference layer, structured observability logging for production
      debugging, and batch scoring workflows for ongoing model monitoring.
    stack:
      - Python
      - FastAPI
      - scikit-learn
      - Docker
    metrics:
      - 40% false positive reduction via threshold tuning

# ------------------------------------------------------------
# QA / Honesty Rules
# ------------------------------------------------------------
qa:
  never_claim:
    - Kubernetes
    - Terraform
    - Spark
    - Scala
    - C++
    - Node.js

  banned_phrases:
    - "I'd love to"
    - "passion for"
    - "passionate about"
    - "team player"
    - "hard worker"
    - "go-getter"
    - "detail-oriented"
    - "fast learner"
    - "eager to learn"
    - "Thank you for your time and consideration"
    - "I am writing to express"
    - "I am excited to apply"
    - "dream job"
    - "perfect fit"